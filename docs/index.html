<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Android Epson Reset</title>
  <style>
    :root {
      --bg: #dfeaec;
      --panel: rgba(255,255,255,0.72);
      --text: #173039;
      --muted: #3f5e66;
      --accent: #1f6f7c;
      --border: #bfd0d4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at top right, #eaf4f5, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      max-width: 760px;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 18px 50px rgba(23, 48, 57, 0.10);
    }
    h1 { margin: 0 0 12px; font-size: 2.2rem; }
    p { color: var(--muted); line-height: 1.6; }
    .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    a.button {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    a.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Android Epson Reset</h1>
    <p>
      Unofficial Android USB OTG utility for compatible Epson printers.
      Read printer status, inspect ink and waste counters, and reset waste ink counters directly from your device.
    </p>
    <div class="links">
      <a class="button" href="https://github.com/tekware-it/android-epson-reset">View GitHub Repository</a>
      <a class="button secondary" href="./privacy-policy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
